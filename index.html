<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>多人联机互通游戏</title>
<style>
body{
  font-family: Arial, Microsoft YaHei;
  padding: 20px;
  background: #f5f5f5;
}
#rankBox{
  background: white;
  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 12px 15px;
  margin: 15px 0;
}
.player-item{
  margin: 6px 0;
  font-size: 14px;
}
button{
  padding: 6px 12px;
  cursor: pointer;
  background: #4299e1;
  color: white;
  border: none;
  border-radius: 4px;
}
input{
  padding: 6px 8px;
  width: 160px;
}
</style>
</head>
<body>

<h1>多人联机 · 数据互通</h1>

<div>
  你的昵称：
  <input type="text" id="nickName" placeholder="输入名字">
  <button onclick="saveMyName()">保存</button>
</div>

<div style="margin:12px 0">
  我的金币：<span id="myGold">0</span>
  <button onclick="addGoldTest()">+100 金币（测试）</button>
</div>

<!-- 排行榜 / 所有玩家列表 -->
<div id="rankBox">
  <h3>全区玩家排行榜</h3>
</div>

<script>
// -------------- 自己的游戏数据 --------------
const gameData = {
  player: { name: "未命名" },
  resources: { gold: 0 },
  myPokemons: [],
  score: 0
}

// -------------- 每人唯一ID（自动账号）--------------
const myUid = localStorage.getItem('uid') || (function () {
  let uid = Math.random().toString(36).slice(2) + Date.now()
  localStorage.setItem('uid', uid)
  return uid
})()

// -------------- 云端互通（同一链接同一房间）--------------
const roomKey = btoa(location.href).slice(0, 32)
const cloudUrl = "https://api.npoint.io/" + roomKey
window.allPlayers = {} // 所有人数据在这里

// -------------- 存储与同步核心 --------------
const GameStorage = {
  async save() {
    // 构造自己的数据
    const myData = {
      player: gameData.player,
      resources: gameData.resources,
      myPokemons: gameData.myPokemons,
      score: gameData.score
    }
    // 本地保存
    localStorage.setItem('myData', JSON.stringify(myData))

    try {
      // 读取云端所有人
      const res = await fetch(cloudUrl)
      let all = res.ok ? await res.json() : {}

      // 只更新自己，不碰别人
      all[myUid] = myData

      // 上传回云端
      await fetch(cloudUrl, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(all)
      })
    } catch (e) {}
  },

  async load() {
    // 读取本地自己存档
    const local = localStorage.getItem('myData')
    if (local) {
      const d = JSON.parse(local)
      gameData.player = d.player || { name: "未命名" }
      gameData.resources = d.resources || { gold: 0 }
      gameData.myPokemons = d.myPokemons || []
      gameData.score = d.score || 0
    }

    // 读取云端所有玩家（互通）
    try {
      const res = await fetch(cloudUrl)
      if (res.ok) {
        window.allPlayers = await res.json()
      }
    } catch (e) {}

    // 更新界面
    updateMyUI()
    showRankList()
  }
}

// -------------- UI 更新 --------------
function updateMyUI() {
  document.getElementById('myGold').innerText = gameData.resources.gold
  document.getElementById('nickName').value = gameData.player.name
}

function saveMyName() {
  gameData.player.name = document.getElementById('nickName').value.trim()
  GameStorage.save()
}

function addGoldTest() {
  gameData.resources.gold += 100
  GameStorage.save()
}

// -------------- 排行榜（互通显示所有人）--------------
function showRankList() {
  const box = document.getElementById('rankBox')
  const list = Object.values(window.allPlayers)

  // 按金币从高到低排序
  list.sort((a, b) => {
    return (b.resources?.gold || 0) - (a.resources?.gold || 0)
  })

  let html = `<h3>全区排行榜（共 ${list.length} 人）</h3>`
  list.forEach((p, index) => {
    const name = p.player?.name || '未命名'
    const gold = p.resources?.gold || 0
    html += `
      <div class="player-item">
        第${index+1}名｜${name}｜金币：${gold}
      </div>
    `
  })

  box.innerHTML = html
}

// -------------- 自动同步（3秒刷新一次）--------------
setInterval(() => {
  GameStorage.load()
}, 3000)

// 页面打开时自动加载
window.onload = () => {
  GameStorage.load()
}
</script>
</body>
</html>
